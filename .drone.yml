kind: pipeline
name: deploy

steps:
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: 103.125.216.110
      username: deploy
      key:
        from_secret: ssh_key
      port: 22
      script:
        - cd /var/www/apps/post-generator
        - git pull origin master
        - sudo systemctl restart post-generator
        - sleep 3
        - curl -I http://127.0.0.1:8502

  - name: notify
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: telegram_token
      to:
        from_secret: telegram_chat_id
      message: |
        🚀 Деплой AI Post Generator успешен!
        📦 Проект: {{.Repo.Name}}
        🌿 Ветка: {{.Build.Branch}}
        💻 Коммит: {{.Build.Commit}}
        🔗 Ссылка: https://aigenerator.myvnc.com
    when:
      status: success

  - name: notify_fail
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: telegram_token
      to:
        from_secret: telegram_chat_id
      message: |
        ❌ Ошибка деплоя AI Post Generator!
        📦 Проект: {{.Repo.Name}}
        🌿 Ветка: {{.Build.Branch}}
        💻 Коммит: {{.Build.Commit}}
    when:
      status: failure
