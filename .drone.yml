kind: pipeline
name: deploy

steps:
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: 103.125.216.110
      username: deploy
      key:
        from_secret: ssh_key
      port: 22
      script:
        - cd /var/www/apps/post-generator
        - git pull origin master
        - sudo systemctl restart post-generator
        - sleep 3
        - curl -I http://127.0.0.1:8502

  - name: notify
    image: curlimages/curl
    commands:
      - |
        curl -s -X POST "https://api.telegram.org/bot8371059723:AAH93MIdz7vrlylsD3LaCJkYQByf2AZk6GI/sendMessage" \
          -d chat_id="7785678797" \
          -d text="Деплой AI Post Generator успешен!%0AПроект: ai-post-generator%0AСсылка: https://aigenerator.myvnc.com"
    when:
      status: success
