kind: pipeline
name: deploy

steps:
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: 103.125.216.110
      username: deploy
      key:
        from_secret: ssh_key
      port: 22
      script:
        - cd /var/www/apps/post-generator
        - git pull origin master
        - sudo systemctl restart post-generator
        - sleep 3
        - curl -I http://127.0.0.1:8502
