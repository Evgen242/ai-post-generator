name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: evgen1771/ai-post-generator
  DEPLOY_PORT: 2222  # Ваш SSH порт

jobs:
  # ========== TEST ==========
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black

      - name: Check syntax
        run: |
          python -m py_compile 🏠_Главная.py
          python -m py_compile modules/generator.py

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,venv,.git

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term 2>/dev/null || echo "No tests found, skipping"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ========== BUILD & DEPLOY ==========
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          script: |
            cd /var/www/apps/post-generator/ai-post-generator
            sudo docker pull ${{ env.DOCKER_IMAGE }}:latest
            sudo docker compose down
            sudo docker compose up -d
            sleep 5
            curl -f http://127.0.0.1:8501 || true
            sudo docker image prune -f

      - name: Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Деплой ai-post-generator успешен!
            📦 Репозиторий: ${{ github.repository }}
            🔗 Commit: ${{ github.sha }}
            📝 Сообщение: ${{ github.event.head_commit.message }}
            👤 Автор: ${{ github.actor }}
            🌐 Сайт: https://autolot25.ddns.net:8082

  # ========== ROLLBACK ==========
  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          script: |
            cd /var/www/apps/post-generator/ai-post-generator
            sudo docker compose down
            sudo docker compose up -d
            echo "⚠️ Rollback выполнен"

      - name: Telegram notification (rollback)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Деплой ai-post-generator провалился!
            🔄 Выполнен откат на предыдущую версию
            👤 Автор: ${{ github.actor }}
            🌐 Сайт: https://autolot25.ddns.net:8082
