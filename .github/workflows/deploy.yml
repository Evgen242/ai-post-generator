name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: evgen1771/ai-post-generator

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /var/www/apps/post-generator/ai-post-generator
            
            # Останавливаем и удаляем старый контейнер
            echo "🛑 Останавливаем старый контейнер..."
            sudo docker stop post-generator 2>/dev/null || true
            sudo docker rm post-generator 2>/dev/null || true
            
            # Скачиваем последний образ
            echo "📦 Скачиваем последний образ..."
            sudo docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            # Запускаем новый контейнер
            echo "🚀 Запускаем новый контейнер..."
            sudo docker run -d \
              --name post-generator \
              -p 8501:8501 \
              -v $(pwd)/logs:/app/logs \
              -v $(pwd)/drone-data:/app/drone-data \
              --env-file .env \
              -e TZ=Europe/Moscow \
              --restart always \
              ${{ env.DOCKER_IMAGE }}:latest
            
            # Проверяем, что контейнер запустился
            sleep 5
            echo "✅ Проверяем статус контейнера..."
            sudo docker ps | grep post-generator
            
            # Очищаем старые образы
            echo "🧹 Очищаем старые образы..."
            sudo docker image prune -f

      - name: Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Деплой ai-post-generator успешен!
            📦 Образ: ${{ env.DOCKER_IMAGE }}:latest
            🔗 Commit: ${{ github.sha }}
            🌐 Сайт: https://autolot25.ddns.net:8082
