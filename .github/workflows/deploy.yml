name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: evgen1771/ai-post-generator

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /var/www/apps/post-generator/ai-post-generator
            
            echo "🛑 Останавливаем compose..."
            sudo docker compose down
            
            echo "🗑️ Удаляем старый контейнер (если есть)..."
            sudo docker rm post-generator 2>/dev/null || true
            
            echo "🗑️ Удаляем старый образ..."
            sudo docker rmi ${{ env.DOCKER_IMAGE }}:latest 2>/dev/null || true
            
            echo "📦 Скачиваем последний образ..."
            sudo docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            echo "🚀 Запускаем новый контейнер..."
            sudo docker compose up -d
            
            echo "✅ Проверяем версию..."
            sleep 3
            sudo docker exec post-generator grep "языка" /app/🏠_Главная.py || echo "❌ Версия не обновилась!"

      - name: Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Деплой ai-post-generator успешен!
            📦 Образ: ${{ env.DOCKER_IMAGE }}:latest
            🌐 Сайт: https://autolot25.ddns.net:8082
